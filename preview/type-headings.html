<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 240px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Headings · scale</div>
  <div style="display:flex; flex-direction: column; gap: 6px;">
    <div style="display:flex; align-items: baseline; gap: 16px;">
      <span style="font: 400 48px/1.15 var(--font-display); letter-spacing: -0.018em;">H1 — Foundation document</span>
      <span style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted)">48 / serif</span>
    </div>
    <div style="display:flex; align-items: baseline; gap: 16px;">
      <span style="font: 400 32px/1.2 var(--font-display); letter-spacing: -0.012em;">H2 — How the protocol works</span>
      <span style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted)">32 / serif</span>
    </div>
    <div style="display:flex; align-items: baseline; gap: 16px;">
      <span style="font: 500 22px/1.2 var(--font-body)">H3 — Pseudonymous by default</span>
      <span style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted)">22 / sans 500</span>
    </div>
    <div style="display:flex; align-items: baseline; gap: 16px;">
      <span style="font: 500 18px/1.25 var(--font-body)">H4 — Open governance</span>
      <span style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted)">18 / sans 500</span>
    </div>
  </div></body></html>
