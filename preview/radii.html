<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Radii · square-leaning (civic documents)</div>
  <div style="display:flex; gap: 24px; align-items:center;">
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 0px;"></div>
        <div style="font: 500 11px/1 'IBM Plex Mono', monospace; color: var(--fg);">radius-0</div>
        <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">0px</div>
        <div style="font: 400 11px/1.2 var(--font-body); color: var(--fg-soft);">rules, tables</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 2px;"></div>
        <div style="font: 500 11px/1 'IBM Plex Mono', monospace; color: var(--fg);">radius-xs</div>
        <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">2px</div>
        <div style="font: 400 11px/1.2 var(--font-body); color: var(--fg-soft);">buttons, badges</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 4px;"></div>
        <div style="font: 500 11px/1 'IBM Plex Mono', monospace; color: var(--fg);">radius-sm</div>
        <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">4px</div>
        <div style="font: 400 11px/1.2 var(--font-body); color: var(--fg-soft);">inputs</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 6px;"></div>
        <div style="font: 500 11px/1 'IBM Plex Mono', monospace; color: var(--fg);">radius-md</div>
        <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">6px</div>
        <div style="font: 400 11px/1.2 var(--font-body); color: var(--fg-soft);">cards, modals</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:64px; height:64px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 999px;"></div>
        <div style="font: 500 11px/1 'IBM Plex Mono', monospace; color: var(--fg);">radius-pill</div>
        <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">∞px</div>
        <div style="font: 400 11px/1.2 var(--font-body); color: var(--fg-soft);">verified dot only</div>
      </div>
    
  </div></body></html>
