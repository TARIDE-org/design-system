<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  .btn { font: 500 15px/1 var(--font-body); padding: 12px 18px; border: 1px solid transparent; border-radius: var(--radius-xs); cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--signal-blue-deep); }
  .btn-secondary { background: transparent; color: var(--fg); border-color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-ghost { background: transparent; color: var(--accent); text-decoration: underline; padding: 12px 4px; }
  .btn-destructive { background: var(--signal-error); color: white; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>The bracket motif · brand-distinctive primitive</div>
  <div style="display:flex; gap: 40px; align-items: center; height: 130px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap: 8px;">
      <svg width="40" height="160" viewBox="0 0 24.19 97.19" style="height: 110px;"><path fill="var(--accent)" d="M18.2,6.52h-18.2v-6.52h24.19v97.19h-24.19v-5.87h18.2v-84.8Z"/></svg>
      <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">top-right · §</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap: 8px;">
      <svg width="40" height="160" viewBox="0 0 24.19 97.19" style="height: 110px;"><g transform="translate(0,-90.51)"><path fill="var(--accent)" d="M5.99,191.31h18.2v6.52H0v-97.19h24.19v5.87H5.99v84.8Z"/></g></svg>
      <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">bottom-left · eyebrow</div>
    </div>
    <div style="flex:1; max-width: 380px;">
      <p style="font: 400 13px/1.55 var(--font-body); color: var(--fg-soft); margin: 0;">
        The asymmetric framing of the logo extends as section markers, eyebrow prefixes, and the verified-credential frame. <i>Direction-dependent:</i> registration marks in B; CLI prompts in C.
      </p>
    </div>
  </div></body></html>
