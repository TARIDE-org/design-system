<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip { height: 64px; border-radius: 2px; }
  .meta { font: 500 11px/1.2 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); }
  .hex  { font: 500 12px/1.2 'IBM Plex Mono', monospace; color: var(--fg); }
  .name { font: 400 11px/1.3 'IBM Plex Sans', sans-serif; color: var(--fg-soft); }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .bracketMark { display: inline-block; width: 5px; height: 14px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; vertical-align: -2px; margin-right: 4px; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Status · functional colors (used sparingly)</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#2D7A5A;"></div>
   <div class="meta">success</div><div class="hex">#2D7A5A</div><div class="name">Verified, signed, ok</div></div>
    <div class="swatch"><div class="chip" style="background:#C7873A;"></div>
   <div class="meta">warning</div><div class="hex">#C7873A</div><div class="name">Caution, partial trust</div></div>
    <div class="swatch"><div class="chip" style="background:#B43A3A;"></div>
   <div class="meta">error</div><div class="hex">#B43A3A</div><div class="name">Failure, revoked</div></div>
    <div class="swatch"><div class="chip" style="background:#F6E1DE;border:1px solid var(--border);"></div>
   <div class="meta">error-tint</div><div class="hex">#F6E1DE</div><div class="name">Error background</div></div>
  </div></body></html>
