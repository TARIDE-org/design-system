<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip { height: 64px; border-radius: 2px; }
  .meta { font: 500 11px/1.2 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); }
  .hex  { font: 500 12px/1.2 'IBM Plex Mono', monospace; color: var(--fg); }
  .name { font: 400 11px/1.3 'IBM Plex Sans', sans-serif; color: var(--fg-soft); }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .bracketMark { display: inline-block; width: 5px; height: 14px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; vertical-align: -2px; margin-right: 4px; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Paper · canvas surfaces</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FDFCF8;border:1px solid var(--border);"></div>
   <div class="meta">paper/0</div><div class="hex">#FDFCF8</div><div class="name">Overlay paper</div></div>
    <div class="swatch"><div class="chip" style="background:#F7F4ED;border:1px solid var(--border);"></div>
   <div class="meta">paper/100</div><div class="hex">#F7F4ED</div><div class="name">Canvas (default)</div></div>
    <div class="swatch"><div class="chip" style="background:#EFEBE0;"></div>
   <div class="meta">paper/200</div><div class="hex">#EFEBE0</div><div class="name">Raised / code</div></div>
    <div class="swatch"><div class="chip" style="background:#E5E0D2;"></div>
   <div class="meta">paper/300</div><div class="hex">#E5E0D2</div><div class="name">Sunken</div></div>
    <div class="swatch"><div class="chip" style="background:#D8D2C3;"></div>
   <div class="meta">rule</div><div class="hex">#D8D2C3</div><div class="name">Dividers, borders</div></div>
  </div></body></html>
