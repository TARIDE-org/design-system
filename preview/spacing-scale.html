<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Spacing · 4-based scale</div>
  <div style="display:flex; align-items:flex-end; gap: 14px; height: 130px;">
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:8px; height:4px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-1</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">4px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:8px; height:8px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-2</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">8px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:12px; height:12px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-3</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">12px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:16px; height:16px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-4</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">16px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:24px; height:24px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-5</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">24px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:32px; height:32px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-6</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">32px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:48px; height:48px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-7</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">48px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:64px; height:64px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-8</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">64px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
        <div style="width:96px; height:96px; background: var(--accent);"></div>
        <div style="font: 500 10px/1 'IBM Plex Mono', monospace; color: var(--fg);">sp-9</div>
        <div style="font: 400 10px/1 'IBM Plex Mono', monospace; color: var(--fg-muted);">96px</div>
      </div>
    
  </div></body></html>
