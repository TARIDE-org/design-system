<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 220px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Display · IBM Plex Serif 400</div>
  <div style="font-family: var(--font-display); font-size: 72px; line-height: 1.05; letter-spacing: -0.018em; color: var(--fg); font-weight: 400; margin-top: 4px;">
    Verification is the default.
  </div>
  <div style="font: 400 11px/1 'IBM Plex Mono', monospace; color: var(--fg-muted); margin-top: 14px; letter-spacing: 0.04em;">
    72 / 76 · 400 · tracking −0.018em &nbsp;·&nbsp; --fs-display
  </div></body></html>
