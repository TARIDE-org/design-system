<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Elevation · rule-first, shadow-rare</div>
  <div style="display:flex; gap: 16px; align-items:flex-start;">
    <div style="flex:1; padding: 16px; background: var(--bg-raised); border-top: 1px solid var(--border); box-shadow: var(--elev-1);">
      <div style="font: 500 12px/1 'IBM Plex Mono', monospace; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;">elev-1</div>
      <div style="font: 400 11px/1.4 'IBM Plex Mono', monospace; color: var(--fg-muted); margin-top: 8px;">single 1px bottom rule. flat content blocks.</div>
    </div>
    <div style="flex:1; padding: 16px; background: var(--bg-raised); box-shadow: var(--elev-2);">
      <div style="font: 500 12px/1 'IBM Plex Mono', monospace; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;">elev-2</div>
      <div style="font: 400 11px/1.4 'IBM Plex Mono', monospace; color: var(--fg-muted); margin-top: 8px;">subtle 1-2px shadow. sticky nav, hovered cards.</div>
    </div>
    <div style="flex:1; padding: 16px; background: var(--bg-overlay); box-shadow: var(--elev-3);">
      <div style="font: 500 12px/1 'IBM Plex Mono', monospace; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase;">elev-3</div>
      <div style="font: 400 11px/1.4 'IBM Plex Mono', monospace; color: var(--fg-muted); margin-top: 8px;">soft 24px shadow, 8% alpha. modals + popovers only.</div>
    </div>
  </div></body></html>
