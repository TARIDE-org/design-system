<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Body · IBM Plex Sans</div>
  <p style="font-family: var(--font-body); font-size: 17px; line-height: 1.6; max-width: 540px; margin: 0 0 8px;">
    TARIDE is an open European protocol for verified digital communications. Pseudonymity by default; identification by choice. Verification is everywhere, identification is rare.
  </p>
  <p style="font-family: var(--font-body); font-size: 15px; line-height: 1.5; color: var(--fg-soft); max-width: 540px; margin: 0 0 12px;">
    <span style="font: 400 12px/1 'IBM Plex Mono', monospace; color: var(--fg-muted)">Body S · 15/1.5</span> Tone is plain-spoken English. No marketing speak, no exclamation marks.
  </p></body></html>
