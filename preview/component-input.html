<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  .btn { font: 500 15px/1 var(--font-body); padding: 12px 18px; border: 1px solid transparent; border-radius: var(--radius-xs); cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--signal-blue-deep); }
  .btn-secondary { background: transparent; color: var(--fg); border-color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-ghost { background: transparent; color: var(--accent); text-decoration: underline; padding: 12px 4px; }
  .btn-destructive { background: var(--signal-error); color: white; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Form fields · input, focus, error</div>
  <div style="display:flex; gap: 12px; align-items: flex-start;">
    <div style="flex: 1;">
      <label style="font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); display: block; margin-bottom: 6px;">phone</label>
      <input style="width: 100%; font: 400 15px/1 var(--font-body); padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--fg); box-sizing: border-box;" value="+31 20 123 4567" />
    </div>
    <div style="flex: 1;">
      <label style="font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-muted); display: block; margin-bottom: 6px;">issuer · focused</label>
      <input style="width: 100%; font: 400 15px/1 var(--font-body); padding: 11px 12px; border: 1px solid var(--accent); border-radius: var(--radius-sm); background: var(--bg); color: var(--fg); box-shadow: var(--focus-ring); box-sizing: border-box;" value="kpn.nl" />
    </div>
    <div style="flex: 1;">
      <label style="font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; color: var(--signal-error); display: block; margin-bottom: 6px;">scope · error</label>
      <input style="width: 100%; font: 400 15px/1 var(--font-body); padding: 11px 12px; border: 1px solid var(--signal-error); border-radius: var(--radius-sm); background: var(--signal-error-tint); color: var(--fg); box-sizing: border-box;" value="public" />
      <div style="font: 400 11px/1.4 'IBM Plex Mono', monospace; color: var(--signal-error); margin-top: 4px;">↳ must be one of: pseudonymous, identified</div>
    </div>
  </div></body></html>
