<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  .btn { font: 500 15px/1 var(--font-body); padding: 12px 18px; border: 1px solid transparent; border-radius: var(--radius-xs); cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--signal-blue-deep); }
  .btn-secondary { background: transparent; color: var(--fg); border-color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-ghost { background: transparent; color: var(--accent); text-decoration: underline; padding: 12px 4px; }
  .btn-destructive { background: var(--signal-error); color: white; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Code block · technical content lives here</div>
  <pre style="background: var(--bg-raised); border-left: 2px solid var(--accent); padding: 14px 16px; margin: 0; font: 400 13px/1.6 var(--font-mono); color: var(--fg); overflow-x: auto;">
<span style="color: var(--fg-muted)"># register an issuer</span>
<span style="color: var(--accent)">POST</span> /v0/registry/issuers
<span style="color: var(--fg-muted)">Content-Type: application/json</span>

{
  <span style="color: #A87B0E">"issuer"</span>: <span style="color: #2D7A5A">"kpn.nl"</span>,
  <span style="color: #A87B0E">"scope"</span>:  <span style="color: #2D7A5A">"pseudonymous"</span>,
  <span style="color: #A87B0E">"chain"</span>:  [<span style="color: #2D7A5A">"eIDAS-L3"</span>, <span style="color: #2D7A5A">"KPN-root"</span>]
}</pre></body></html>
