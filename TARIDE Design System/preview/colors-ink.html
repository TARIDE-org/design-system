<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip { height: 64px; border-radius: 2px; }
  .meta { font: 500 11px/1.2 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); }
  .hex  { font: 500 12px/1.2 'IBM Plex Mono', monospace; color: var(--fg); }
  .name { font: 400 11px/1.3 'IBM Plex Sans', sans-serif; color: var(--fg-soft); }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .bracketMark { display: inline-block; width: 5px; height: 14px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; vertical-align: -2px; margin-right: 4px; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Ink · text on paper</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#10100B;"></div>
   <div class="meta">ink/100</div><div class="hex">#10100B</div><div class="name">Body text · 16.4:1</div></div>
    <div class="swatch"><div class="chip" style="background:#2A2823;"></div>
   <div class="meta">ink/80</div><div class="hex">#2A2823</div><div class="name">Strong UI · 12.1:1</div></div>
    <div class="swatch"><div class="chip" style="background:#3D3A33;"></div>
   <div class="meta">ink/70</div><div class="hex">#3D3A33</div><div class="name">Secondary · 9.0:1</div></div>
    <div class="swatch"><div class="chip" style="background:#5A5650;"></div>
   <div class="meta">ink/50</div><div class="hex">#5A5650</div><div class="name">Tertiary  · 5.8:1</div></div>
    <div class="swatch"><div class="chip" style="background:#8A847A;"></div>
   <div class="meta">stone/500</div><div class="hex">#8A847A</div><div class="name">Meta / captions · 3.4:1</div></div>
  </div></body></html>
