<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 220px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Type pairing · serif over sans over mono</div>
  <div style="font: 400 34px/1.15 var(--font-display); letter-spacing: -0.014em; margin-bottom: 8px;">Trust without identification</div>
  <div style="font: 400 16px/1.55 var(--font-body); color: var(--fg-soft); margin-bottom: 10px; max-width: 540px;">
    The serif gives the page document-weight; the sans gives prose modern legibility; the mono carries protocol detail and acts as the system's voice when speaking technically.
  </div>
  <div style="font: 400 12px/1.5 var(--font-mono); color: var(--accent); letter-spacing: 0.04em;">
    SERIF + SANS + MONO &nbsp;·&nbsp; one family, three registers
  </div></body></html>
