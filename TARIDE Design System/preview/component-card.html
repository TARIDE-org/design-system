<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  .btn { font: 500 15px/1 var(--font-body); padding: 12px 18px; border: 1px solid transparent; border-radius: var(--radius-xs); cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--signal-blue-deep); }
  .btn-secondary { background: transparent; color: var(--fg); border-color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-ghost { background: transparent; color: var(--accent); text-decoration: underline; padding: 12px 4px; }
  .btn-destructive { background: var(--signal-error); color: white; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Card · content block (no colored left border)</div>
  <div style="display:flex; gap: 14px;">
    <div style="flex:1; padding: 18px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-md);">
      <div style="font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;">§1 registration</div>
      <div style="font: 500 17px/1.3 var(--font-body); color: var(--fg); margin-bottom: 8px;">Who can register?</div>
      <p style="font: 400 13px/1.5 var(--font-body); color: var(--fg-soft); margin: 0;">Any operator with an eIDAS-aligned chain of trust may register.</p>
    </div>
    <div style="flex:1; padding: 18px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-md); box-shadow: var(--elev-2);">
      <div style="font: 500 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;">§2 verification</div>
      <div style="font: 500 17px/1.3 var(--font-body); color: var(--fg); margin-bottom: 8px;">Hovered · adds elev-2</div>
      <p style="font: 400 13px/1.5 var(--font-body); color: var(--fg-soft); margin: 0;">No transform; no scale. Civic cards stay put.</p>
    </div>
  </div></body></html>
