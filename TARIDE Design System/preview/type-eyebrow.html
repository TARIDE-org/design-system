<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 140px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Eyebrow · the bracket-prefixed mono caption</div>
  <div style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px;">
    <span class="bracketMark" style="color:var(--accent)"></span>§3 · how it works
  </div>
  <div style="font: 400 32px/1.2 var(--font-display); letter-spacing: -0.012em;">Five layers, governed by a foundation</div>
  <div style="font: 400 11px/1.4 'IBM Plex Mono', monospace; color: var(--fg-muted); margin-top: 10px;">
    Used at the top of every major section. Bracket + § + caption. Always uppercase. Always tracked 0.12em.
  </div></body></html>
