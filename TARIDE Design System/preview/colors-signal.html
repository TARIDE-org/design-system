<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip { height: 64px; border-radius: 2px; }
  .meta { font: 500 11px/1.2 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); }
  .hex  { font: 500 12px/1.2 'IBM Plex Mono', monospace; color: var(--fg); }
  .name { font: 400 11px/1.3 'IBM Plex Sans', sans-serif; color: var(--fg-soft); }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .bracketMark { display: inline-block; width: 5px; height: 14px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; vertical-align: -2px; margin-right: 4px; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Signal · brand accents</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#0A55C7;"></div>
   <div class="meta">signal/blue</div><div class="hex">#0A55C7</div><div class="name">Links · primary action</div></div>
    <div class="swatch"><div class="chip" style="background:#063B92;"></div>
   <div class="meta">signal/blue-deep</div><div class="hex">#063B92</div><div class="name">Link hover</div></div>
    <div class="swatch"><div class="chip" style="background:#E3ECFA;border:1px solid var(--border);"></div>
   <div class="meta">signal/blue-tint</div><div class="hex">#E3ECFA</div><div class="name">Selection · focus</div></div>
    <div class="swatch"><div class="chip" style="background:#E8B43A;"></div>
   <div class="meta">signal/yellow</div><div class="hex">#E8B43A</div><div class="name">Verified credential</div></div>
    <div class="swatch"><div class="chip" style="background:#F9EDC8;border:1px solid var(--border);"></div>
   <div class="meta">signal/yellow-tint</div><div class="hex">#F9EDC8</div><div class="name">Verified background</div></div>
  </div></body></html>
