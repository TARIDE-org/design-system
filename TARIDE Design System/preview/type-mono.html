<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 180px; box-sizing: border-box; }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Monospace · IBM Plex Mono</div>
  <pre style="background: var(--bg-raised); border-left: 2px solid var(--accent); padding: 14px 16px; margin: 0; font-family: var(--font-mono); font-size: 14px; line-height: 1.55; color: var(--fg);">
<span style="color:var(--fg-muted)"># resolve a caller</span>
<span style="color:var(--accent)">taride</span> resolve +31201234567
<span style="color:var(--fg-muted)">↳ issuer </span> "kpn.nl"
<span style="color:var(--fg-muted)">↳ scope  </span> "pseudonymous"
<span style="color:var(--fg-muted)">↳ status </span> <span style="color:#2D7A5A">verified</span></pre></body></html>
