<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 240px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip { height: 64px; border-radius: 2px; }
  .meta { font: 500 11px/1.2 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-muted); }
  .hex  { font: 500 12px/1.2 'IBM Plex Mono', monospace; color: var(--fg); }
  .name { font: 400 11px/1.3 'IBM Plex Sans', sans-serif; color: var(--fg-soft); }
  .lbl  { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 6px; }
  .bracketMark { display: inline-block; width: 5px; height: 14px; border-left: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; vertical-align: -2px; margin-right: 4px; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Semantic mapping · raw → role</div>
  <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 8px 24px;
       font: 400 13px/1.5 'IBM Plex Mono', monospace; color: var(--fg);">
    <div>--fg          <span style="color:var(--fg-muted)">→ ink/100</span></div>
    <div>--bg          <span style="color:var(--fg-muted)">→ paper/100</span></div>
    <div>--fg-soft     <span style="color:var(--fg-muted)">→ ink/70</span></div>
    <div>--bg-raised   <span style="color:var(--fg-muted)">→ paper/200</span></div>
    <div>--fg-muted    <span style="color:var(--fg-muted)">→ stone/500</span></div>
    <div>--border      <span style="color:var(--fg-muted)">→ rule</span></div>
    <div>--accent      <span style="color:var(--fg-muted)">→ signal-blue</span></div>
    <div>--accent-tint <span style="color:var(--fg-muted)">→ signal-blue-tint</span></div>
    <div>--verified    <span style="color:var(--fg-muted)">→ signal-yellow</span></div>
    <div>--verified-bg <span style="color:var(--fg-muted)">→ signal-yellow-tint</span></div>
  </div></body></html>
