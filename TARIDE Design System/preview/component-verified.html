<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--bg); color: var(--fg); padding: 20px 24px; min-height: 220px; box-sizing: border-box; }
  .lbl { font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .bracketMark { display:inline-block; width:5px; height:14px; border-left:1.5px solid currentColor; border-bottom:1.5px solid currentColor; vertical-align:-2px; margin-right:4px; }
  .btn { font: 500 15px/1 var(--font-body); padding: 12px 18px; border: 1px solid transparent; border-radius: var(--radius-xs); cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--signal-blue-deep); }
  .btn-secondary { background: transparent; color: var(--fg); border-color: var(--fg); }
  .btn-secondary:hover { background: var(--fg); color: var(--bg); }
  .btn-ghost { background: transparent; color: var(--accent); text-decoration: underline; padding: 12px 4px; }
  .btn-destructive { background: var(--signal-error); color: white; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
</style>
</head><body>
  <div class="lbl"><span class="bracketMark" style="color:var(--accent)"></span>Verified credential · brand-distinctive component (answer to Q4)</div>
  <div style="display:flex; gap: 16px; align-items: stretch; flex-wrap: wrap;">
    <!-- inline pill form -->
    <div style="display:flex; align-items:center; gap: 10px; padding: 10px 14px; background: var(--verified-bg); border: 1px solid var(--verified); border-radius: var(--radius-xs); font: 500 12px/1 'IBM Plex Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg);">
      <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--verified); box-shadow: 0 0 0 3px var(--verified-bg);"></span>
      Verified credential · kpn.nl
    </div>
    <!-- framed form, mirroring the logo asymmetry -->
    <div style="position: relative; padding: 18px 22px 18px 22px; background: var(--bg-raised); flex: 1; min-width: 280px; max-width: 460px;">
      <span style="position: absolute; top: -2px; right: 0; width: 14px; height: 28px; border-top: 2px solid var(--verified); border-right: 2px solid var(--verified);"></span>
      <span style="position: absolute; bottom: -2px; left: 0; width: 14px; height: 28px; border-bottom: 2px solid var(--verified); border-left: 2px solid var(--verified);"></span>
      <div style="font: 500 10px/1 'IBM Plex Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: #A87B0E; margin-bottom: 8px;">Verified credential</div>
      <div style="font: 400 20px/1.25 var(--font-display); color: var(--fg); margin-bottom: 12px;">KPN asserts this call originates from a registered operator.</div>
      <div style="font: 400 11px/1.5 'IBM Plex Mono', monospace; color: var(--fg-muted);">
        issued&nbsp;&nbsp;2026-05-18T10:03Z<br/>
        chain&nbsp;&nbsp;&nbsp;eIDAS L3 → KPN<br/>
        scope&nbsp;&nbsp;&nbsp;pseudonymous
      </div>
    </div>
  </div></body></html>
