<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
  </defs>

  <rect width="900" height="600" fill="#F7F4ED"></rect>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Stakeholder incentives</text>

  
  <circle cx="450" cy="295" r="70" fill="#10100B" filter="url(#shadow)"></circle>
  <text x="450" y="289" text-anchor="middle" font-size="18" font-weight="bold" fill="#FDFCF8">TARIDE</text>
  <text x="450" y="309" text-anchor="middle" font-size="10" fill="#E5E0D2">open protocol</text>

  
  <line x1="450" y1="225" x2="450" y2="120" stroke="#C8D6DC" stroke-width="1.5"></line>
  <line x1="380" y1="248" x2="195" y2="140" stroke="#C8D6DC" stroke-width="1.5"></line>
  <line x1="520" y1="248" x2="705" y2="140" stroke="#C8D6DC" stroke-width="1.5"></line>
  <line x1="380" y1="342" x2="195" y2="440" stroke="#C8D6DC" stroke-width="1.5"></line>
  <line x1="520" y1="342" x2="705" y2="440" stroke="#C8D6DC" stroke-width="1.5"></line>
  <line x1="450" y1="365" x2="450" y2="460" stroke="#C8D6DC" stroke-width="1.5"></line>

  
  <rect x="325" y="60" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="450" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">End users</text>
  <text x="450" y="104" text-anchor="middle" font-size="10" fill="#8A847A">Know who is calling  ·  less spam  ·  zero cost</text>

  
  <rect x="30" y="80" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#2A6496" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="155" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Government</text>
  <text x="155" y="124" text-anchor="middle" font-size="10" fill="#8A847A">Policy goals  ·  eIDAS alignment  ·  sovereignty</text>

  
  <rect x="620" y="80" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#2A6496" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="745" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Attestation providers &amp; cache nodes</text>
  <text x="745" y="124" text-anchor="middle" font-size="10" fill="#8A847A">Protocol fees  ·  competitive edge  ·  fraud intel</text>

  
  <rect x="30" y="400" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#2A6496" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="155" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Credential issuers</text>
  <text x="155" y="444" text-anchor="middle" font-size="10" fill="#8A847A">Digitalise existing role  ·  credential fees</text>

  
  <rect x="620" y="400" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#8A847A" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="745" y="424" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Blockchain layer</text>
  <text x="745" y="444" text-anchor="middle" font-size="10" fill="#8A847A">Existing economics  ·  L2 gas fees or EBSI</text>

  
  <rect x="325" y="460" width="250" height="62" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="450" y="484" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Application developers</text>
  <text x="450" y="504" text-anchor="middle" font-size="10" fill="#8A847A">Verification layer without building it  ·  open API</text>

  
  <rect x="150" y="548" width="600" height="40" rx="4" fill="#FAF8F1" stroke="#C8D6DC" stroke-width="1"></rect>
  <text x="450" y="573" text-anchor="middle" font-size="11" fill="#8A847A">Foundation revenue: protocol fees (per lookup)  ·  credential fees  ·  grants + EU funding  ·  strategic partnerships</text>

  
  <text x="395" y="175" text-anchor="end" font-size="9" fill="#BFB8AC" transform="rotate(-45, 395, 175)">feedback</text>
  <text x="500" y="175" text-anchor="start" font-size="9" fill="#BFB8AC" transform="rotate(45, 500, 175)">trust data</text>

  <text x="270" y="180" text-anchor="middle" font-size="9" fill="#BFB8AC">regulation</text>
  <text x="270" y="192" text-anchor="middle" font-size="9" fill="#BFB8AC">+ funding</text>

  <text x="630" y="180" text-anchor="middle" font-size="9" fill="#BFB8AC">lookups</text>
  <text x="630" y="192" text-anchor="middle" font-size="9" fill="#BFB8AC">+ fees</text>

  <text x="270" y="395" text-anchor="middle" font-size="9" fill="#BFB8AC">credentials</text>
  <text x="630" y="395" text-anchor="middle" font-size="9" fill="#BFB8AC">transactions</text>

  <text x="410" y="430" text-anchor="end" font-size="9" fill="#BFB8AC">open API</text>
</svg>