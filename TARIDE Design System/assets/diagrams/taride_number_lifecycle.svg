<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#10100B"></path>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#F7F4ED"></rect>
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Number lifecycle on the TARIDE protocol</text>

  
  <text x="50" y="70" font-size="13" font-weight="bold" fill="#10100B">1. Registration</text>
  <rect x="50" y="80" width="800" height="60" rx="4" fill="#E8F4E8" stroke="#4A8A4A" stroke-width="1"></rect>
  <text x="130" y="105" text-anchor="middle" font-size="10" fill="#2A5A2A">Holder creates</text>
  <text x="130" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A5A2A">DID A</text>
  <line x1="195" y1="110" x2="240" y2="110" stroke="#4A8A4A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="290" y="105" text-anchor="middle" font-size="10" fill="#2A5A2A">Links to</text>
  <text x="290" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A5A2A">+31 6 1234 5678</text>
  <line x1="355" y1="110" x2="405" y2="110" stroke="#4A8A4A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="490" y="105" text-anchor="middle" font-size="10" fill="#2A5A2A">Odido issues</text>
  <text x="490" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A5A2A">verification credential</text>
  <line x1="570" y1="110" x2="620" y2="110" stroke="#4A8A4A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="730" y="105" text-anchor="middle" font-size="10" fill="#2A5A2A">Status:</text>
  <text x="730" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#2A5A2A">Verified</text>

  
  <text x="50" y="170" font-size="13" font-weight="bold" fill="#10100B">2. Number portability (Odido → KPN)</text>
  <rect x="50" y="180" width="800" height="100" rx="4" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>

  <text x="130" y="205" text-anchor="middle" font-size="10" fill="#0A55C7">Number ported</text>
  <text x="130" y="218" text-anchor="middle" font-size="10" fill="#0A55C7">to KPN</text>
  <line x1="195" y1="210" x2="240" y2="210" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arr)"></line>

  <text x="320" y="205" text-anchor="middle" font-size="10" fill="#0A55C7">Odido credential</text>
  <text x="320" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B3A3A">revoked</text>
  <line x1="385" y1="210" x2="425" y2="210" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arr)"></line>

  <rect x="425" y="198" width="120" height="28" rx="3" fill="#E3ECFA" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="485" y="216" text-anchor="middle" font-size="10" fill="#063B92">Transition gap</text>

  <line x1="545" y1="210" x2="590" y2="210" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="680" y="205" text-anchor="middle" font-size="10" fill="#0A55C7">KPN issues fresh</text>
  <text x="680" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#0A55C7">verification credential</text>

  <text x="450" y="255" text-anchor="middle" font-size="10" fill="#8A847A">DID A is unchanged · same number · new provider · reputation preserved</text>
  <text x="450" y="270" text-anchor="middle" font-size="9" fill="#BFB8AC">During the gap: apps display &#34;credential renewal&#34;, not &#34;trust violation&#34;</text>

  
  <text x="50" y="310" font-size="13" font-weight="bold" fill="#10100B">3. Contract termination + number recycling</text>
  <rect x="50" y="320" width="800" height="140" rx="4" fill="#FAF8F1" stroke="#8A847A" stroke-width="1"></rect>

  
  <text x="75" y="345" font-size="10" font-weight="bold" fill="#8A847A">a.</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="#8A847A">Holder A ends contract</text>
  <line x1="225" y1="340" x2="270" y2="340" stroke="#8A847A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="370" y="345" text-anchor="middle" font-size="10" fill="#8A847A">Provider revokes credential</text>
  <line x1="460" y1="340" x2="510" y2="340" stroke="#8A847A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="610" y="340" text-anchor="middle" font-size="10" fill="#8A847A">Attestation provider removes</text>
  <text x="610" y="353" text-anchor="middle" font-size="10" fill="#8A847A">number-DID A link</text>
  <line x1="690" y1="345" x2="730" y2="345" stroke="#8A847A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="800" y="345" text-anchor="middle" font-size="10" fill="#8A847A">Number returns</text>
  <text x="800" y="358" text-anchor="middle" font-size="10" fill="#8A847A">to provider pool</text>

  
  <text x="75" y="390" font-size="10" font-weight="bold" fill="#8A847A">b.</text>
  <text x="195" y="390" text-anchor="middle" font-size="10" fill="#8A847A">Quarantine (90-180 days, varies by country/provider)</text>

  
  <text x="75" y="420" font-size="10" font-weight="bold" fill="#8A847A">c.</text>
  <text x="150" y="420" text-anchor="middle" font-size="10" fill="#0A55C7">New holder B</text>
  <text x="150" y="433" text-anchor="middle" font-size="10" font-weight="bold" fill="#0A55C7">has DID B</text>
  <line x1="215" y1="425" x2="260" y2="425" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="370" y="420" text-anchor="middle" font-size="10" fill="#0A55C7">Provider issues fresh credential</text>
  <text x="370" y="433" text-anchor="middle" font-size="10" fill="#0A55C7">for DID B + same number</text>
  <line x1="470" y1="425" x2="520" y2="425" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="650" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#2A5A2A">Clean separation:</text>
  <text x="650" y="433" text-anchor="middle" font-size="10" fill="#2A5A2A">DID A reputation stays with DID A</text>
  <text x="650" y="446" text-anchor="middle" font-size="10" fill="#2A5A2A">DID B starts with no history</text>
  <text x="650" y="459" text-anchor="middle" font-size="9" fill="#8A847A">Attestation provider tracks last_time_active per number+DID</text>

  
  <text x="50" y="490" font-size="13" font-weight="bold" fill="#10100B">4. Reputation evasion attempt</text>
  <rect x="50" y="500" width="800" height="100" rx="4" fill="#FFF0F0" stroke="#8B3A3A" stroke-width="1"></rect>

  <text x="130" y="525" text-anchor="middle" font-size="10" fill="#8B3A3A">Bad actor</text>
  <text x="130" y="538" text-anchor="middle" font-size="10" fill="#8B3A3A">abandons DID A</text>
  <line x1="195" y1="530" x2="230" y2="530" stroke="#8B3A3A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="300" y="525" text-anchor="middle" font-size="10" fill="#8B3A3A">Creates new</text>
  <text x="300" y="538" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B3A3A">DID C</text>
  <line x1="350" y1="530" x2="390" y2="530" stroke="#8B3A3A" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="475" y="525" text-anchor="middle" font-size="10" fill="#8B3A3A">Must sever number</text>
  <text x="475" y="538" text-anchor="middle" font-size="10" fill="#8B3A3A">from DID A first</text>
  <line x1="545" y1="530" x2="580" y2="530" stroke="#8B3A3A" stroke-width="1.5" marker-end="url(#arr)"></line>

  <rect x="580" y="513" width="250" height="40" rx="3" fill="#FDFCF8" stroke="#8B3A3A" stroke-width="1"></rect>
  <text x="705" y="530" text-anchor="middle" font-size="10" font-weight="bold" fill="#8B3A3A">DID C = fresh, unknown, untrusted</text>
  <text x="705" y="543" text-anchor="middle" font-size="9" fill="#8B3A3A">New account age · no reputation · low trust signal</text>

  <text x="450" y="582" text-anchor="middle" font-size="10" fill="#8A847A">Fresh DID = lowest trust position. Time is the only resource a bad actor cannot fake.</text>
</svg>