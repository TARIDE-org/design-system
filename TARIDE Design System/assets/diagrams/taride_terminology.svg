<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 830" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#8A847A"></path>
    </marker>
    <marker id="arrDk" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#10100B"></path>
    </marker>
  </defs>

  <rect width="960" height="830" fill="#F7F4ED"></rect>
  <text x="480" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">TARIDE terminology and relationships</text>

  
  <rect x="370" y="60" width="220" height="70" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="480" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFCF8">Holder</text>
  <text x="480" y="108" text-anchor="middle" font-size="10" fill="#E5E0D2">Person, business, or institution</text>

  
  <rect x="370" y="175" width="220" height="70" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="480" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFCF8">DID</text>
  <text x="480" y="218" text-anchor="middle" font-size="10" fill="#E5E0D2">Decentralised identifier</text>
  <text x="480" y="233" text-anchor="middle" font-size="9" fill="#E5E0D2">On-chain · pseudonymous · self-sovereign</text>

  
  <line x1="480" y1="130" x2="480" y2="175" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrDk)"></line>
  <text x="490" y="156" font-size="9" fill="#8A847A">creates + owns</text>

  
  <rect x="120" y="80" width="180" height="50" rx="4" fill="#FAF8F1" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="210" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#10100B">Private key</text>
  <text x="210" y="118" text-anchor="middle" font-size="9" fill="#8A847A">Secure enclave · never leaves device</text>
  <line x1="300" y1="105" x2="370" y2="95" stroke="#8A847A" stroke-width="1" stroke-dasharray="4 2"></line>
  <text x="330" y="93" font-size="8" fill="#BFB8AC">held by</text>

  
  <rect x="90" y="190" width="210" height="115" rx="4" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="195" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#10100B">Instances</text>
  <text x="195" y="228" text-anchor="middle" font-size="9" fill="#BFB8AC">Specific addresses per channel</text>
  <text x="105" y="248" font-size="9" fill="#8A847A">Telephony:</text>
  <text x="175" y="248" font-size="9" fill="#10100B">+31 6 1234 5678</text>
  <text x="105" y="263" font-size="9" fill="#8A847A">Email:</text>
  <text x="175" y="263" font-size="9" fill="#10100B">japie@google.com</text>
  <text x="105" y="278" font-size="9" fill="#8A847A">WhatsApp:</text>
  <text x="175" y="278" font-size="9" fill="#10100B">@japie</text>
  <text x="195" y="296" text-anchor="middle" font-size="9" fill="#BFB8AC">One DID can have multiple instances</text>

  
  <line x1="370" y1="210" x2="300" y2="220" stroke="#0A55C7" stroke-width="1.5" marker-end="url(#arrDk)"></line>
  <text x="325" y="223" font-size="8" fill="#8A847A">links to</text>

  
  <rect x="90" y="310" width="210" height="36" rx="3" fill="#E3ECFA" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="195" y="333" text-anchor="middle" font-size="9" fill="#063B92">Rule: 1 instance = max 1 DID at a time</text>

  
  <rect x="660" y="175" width="220" height="70" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="770" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#10100B">Attestation provider</text>
  <text x="770" y="218" text-anchor="middle" font-size="10" fill="#8A847A">KPN · Odido · Google · Meta</text>
  <text x="770" y="233" text-anchor="middle" font-size="9" fill="#BFB8AC">Confirms ownership, does not own DID</text>

  
  <line x1="770" y1="245" x2="770" y2="290" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrDk)"></line>
  <text x="780" y="272" font-size="9" fill="#8A847A">issues</text>

  
  <rect x="620" y="290" width="300" height="80" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="770" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFCF8">Verification credential</text>
  <text x="770" y="335" text-anchor="middle" font-size="10" fill="#E5E0D2">Mandatory · on-chain · revocable</text>
  <text x="770" y="352" text-anchor="middle" font-size="9" fill="#E5E0D2">&#34;Instance registered to DID holder&#34;</text>

  
  <line x1="620" y1="330" x2="590" y2="220" stroke="#8A847A" stroke-width="1" marker-end="url(#arr)"></line>
  <text x="598" y="278" font-size="8" fill="#8A847A">linked to</text>

  
  <rect x="620" y="395" width="145" height="55" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="692" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#10100B">Contract owner</text>
  <text x="692" y="432" text-anchor="middle" font-size="9" fill="#8A847A">Paying customer</text>
  <text x="692" y="444" text-anchor="middle" font-size="9" fill="#8A847A">Lifecycle events</text>

  <rect x="775" y="395" width="145" height="55" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="847" y="415" text-anchor="middle" font-size="11" font-weight="bold" fill="#10100B">End user</text>
  <text x="847" y="432" text-anchor="middle" font-size="9" fill="#8A847A">Actual device user</text>
  <text x="847" y="444" text-anchor="middle" font-size="9" fill="#8A847A">Real-time verification</text>

  <line x1="770" y1="370" x2="692" y2="395" stroke="#8A847A" stroke-width="1"></line>
  <line x1="770" y1="370" x2="847" y2="395" stroke="#8A847A" stroke-width="1"></line>
  <text x="770" y="388" text-anchor="middle" font-size="8" fill="#BFB8AC">two types</text>

  
  <rect x="620" y="470" width="300" height="55" rx="3" fill="#FAF8F1" stroke="#C8D6DC" stroke-width="1"></rect>
  <text x="770" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#10100B">Credential metadata</text>
  <text x="770" y="508" text-anchor="middle" font-size="9" fill="#8A847A">Prepaid/subscription · account age · ID level · last SIM swap · last reassignment</text>
  <line x1="770" y1="450" x2="770" y2="470" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="3 2"></line>

  
  <rect x="350" y="310" width="230" height="60" rx="4" fill="#EFEBE0" stroke="#8A847A" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"></rect>
  <text x="465" y="335" text-anchor="middle" font-size="12" font-weight="bold" fill="#10100B">Identity credentials</text>
  <text x="465" y="352" text-anchor="middle" font-size="9" fill="#8A847A">Optional · KvK · regulators · certifications</text>

  <line x1="465" y1="245" x2="465" y2="310" stroke="#8A847A" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr)"></line>
  <text x="475" y="280" font-size="8" fill="#BFB8AC">opt-in</text>

  
  <rect x="90" y="400" width="230" height="120" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="205" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">Resolver network</text>
  <text x="205" y="436" text-anchor="middle" font-size="9" fill="#BFB8AC">Off-chain · distributed · DNS-like</text>

  
  <rect x="100" y="446" width="210" height="28" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="110" y="464" font-size="9" font-weight="bold" fill="#10100B">Attestation providers</text>
  <text x="310" y="464" text-anchor="end" font-size="8" fill="#8A847A">issue + revoke</text>

  
  <rect x="100" y="480" width="210" height="28" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="110" y="498" font-size="9" font-weight="bold" fill="#10100B">Cache nodes</text>
  <text x="310" y="498" text-anchor="end" font-size="8" fill="#8A847A">serve lookups</text>

  <line x1="205" y1="346" x2="205" y2="400" stroke="#8A847A" stroke-width="1" marker-end="url(#arr)"></line>

  
  <rect x="90" y="560" width="230" height="60" rx="4" fill="#2E5A6E" filter="url(#shadow)"></rect>
  <text x="205" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#FDFCF8">Reputation score</text>
  <text x="205" y="603" text-anchor="middle" font-size="9" fill="#E5E0D2">On-chain · aggregated · only opt-in DIDs</text>

  <line x1="205" y1="520" x2="205" y2="560" stroke="#8A847A" stroke-width="1" marker-end="url(#arr)"></line>

  
  <rect x="370" y="440" width="200" height="55" rx="4" fill="#FDFCF8" stroke="#2E5A6E" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="470" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#10100B">Applications</text>
  <text x="470" y="478" text-anchor="middle" font-size="9" fill="#8A847A">Calmido · third-party apps</text>

  <line x1="310" y1="494" x2="370" y2="470" stroke="#8A847A" stroke-width="1" marker-end="url(#arr)"></line>
  <text x="332" y="490" font-size="8" fill="#BFB8AC">queries</text>

  
  <rect x="370" y="550" width="200" height="45" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="470" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">Blockchain (L2 / EBSI)</text>
  <text x="470" y="584" text-anchor="middle" font-size="9" fill="#E5E0D2">DIDs · credentials · commitments</text>

  
  <rect x="90" y="640" width="230" height="40" rx="4" fill="#2E5A6E" filter="url(#shadow)"></rect>
  <text x="205" y="656" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">Consent layer</text>
  <text x="205" y="672" text-anchor="middle" font-size="9" fill="#E5E0D2">Open · verified · established · trusted · contacts</text>
  <line x1="205" y1="620" x2="205" y2="640" stroke="#8A847A" stroke-width="1" marker-end="url(#arr)"></line>

  
  <rect x="90" y="700" width="780" height="75" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="480" y="722" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFCF8">Time as the ultimate trust signal</text>
  <text x="200" y="745" text-anchor="middle" font-size="10" fill="#E5E0D2">DID age</text>
  <text x="200" y="760" text-anchor="middle" font-size="9" fill="#6AA0B0">When was it created? (on-chain)</text>
  <text x="480" y="745" text-anchor="middle" font-size="10" fill="#E5E0D2">Association age</text>
  <text x="480" y="760" text-anchor="middle" font-size="9" fill="#6AA0B0">How long is this number linked? (attestation provider)</text>
  <text x="760" y="745" text-anchor="middle" font-size="10" fill="#E5E0D2">Last attestation provider change</text>
  <text x="760" y="760" text-anchor="middle" font-size="9" fill="#6AA0B0">When did the attestation provider last change?</text>

  
  <rect x="90" y="795" width="16" height="10" rx="2" fill="#0A55C7"></rect>
  <text x="112" y="804" font-size="9" fill="#8A847A">Core protocol element</text>
  <rect x="260" y="795" width="16" height="10" rx="2" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5"></rect>
  <text x="282" y="804" font-size="9" fill="#8A847A">Infrastructure</text>
  <rect x="400" y="795" width="16" height="10" rx="2" fill="#EFEBE0" stroke="#8A847A" stroke-width="1" stroke-dasharray="4 2"></rect>
  <text x="422" y="804" font-size="9" fill="#8A847A">Optional layer</text>
</svg>