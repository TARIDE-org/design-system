<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
    <marker id="arrowUp" viewBox="0 0 10 7" refX="5" refY="0" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 7 L 5 0 L 10 7 z" fill="#8A847A"></path>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#F7F4ED"></rect>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Credential trust chain</text>

  
  <rect x="200" y="60" width="500" height="80" rx="4" fill="#EFEBE0" stroke="#8A847A" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"></rect>
  <text x="450" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#10100B">Optional: identity credentials</text>
  <text x="450" y="116" text-anchor="middle" font-size="11" fill="#8A847A">KvK registration  ·  sector licences  ·  quality marks  ·  certifications</text>
  <text x="210" y="76" font-size="9" fill="#8A847A" font-style="italic">voluntary</text>

  
  <line x1="450" y1="140" x2="450" y2="168" stroke="#8A847A" stroke-width="1.5" marker-end="url(#arrowUp)"></line>

  
  <rect x="200" y="168" width="500" height="80" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="450" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFCF8">Mandatory: instance verification</text>
  <text x="450" y="224" text-anchor="middle" font-size="11" fill="#E5E0D2">Attestation provider confirms: this instance is registered to this DID</text>
  <text x="210" y="184" font-size="9" fill="#E5E0D2" font-style="italic">required</text>

  
  <rect x="30" y="178" width="140" height="26" rx="3" fill="#EFEBE0" stroke="#8A847A" stroke-width="1"></rect>
  <text x="100" y="196" text-anchor="middle" font-size="10" fill="#10100B">Odido / KPN / Vodafone</text>
  <line x1="170" y1="191" x2="200" y2="208" stroke="#8A847A" stroke-width="1"></line>

  <rect x="30" y="212" width="140" height="26" rx="3" fill="#EFEBE0" stroke="#8A847A" stroke-width="1"></rect>
  <text x="100" y="230" text-anchor="middle" font-size="10" fill="#10100B">Email att. providers</text>
  <line x1="170" y1="225" x2="200" y2="218" stroke="#8A847A" stroke-width="1"></line>

  <rect x="730" y="178" width="140" height="26" rx="3" fill="#EFEBE0" stroke="#8A847A" stroke-width="1"></rect>
  <text x="800" y="196" text-anchor="middle" font-size="10" fill="#10100B">WhatsApp / Signal</text>
  <line x1="730" y1="191" x2="700" y2="208" stroke="#8A847A" stroke-width="1"></line>

  <rect x="730" y="212" width="140" height="26" rx="3" fill="#EFEBE0" stroke="#8A847A" stroke-width="1"></rect>
  <text x="800" y="230" text-anchor="middle" font-size="10" fill="#10100B">Other platforms</text>
  <line x1="730" y1="225" x2="700" y2="218" stroke="#8A847A" stroke-width="1"></line>

  
  <line x1="450" y1="248" x2="450" y2="276" stroke="#8A847A" stroke-width="1.5" marker-end="url(#arrowUp)"></line>

  
  <rect x="200" y="276" width="500" height="80" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="450" y="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#FDFCF8">Self-sovereign DID</text>
  <text x="450" y="332" text-anchor="middle" font-size="11" fill="#E5E0D2">Created by holder  ·  on-chain  ·  pseudonymous  ·  portable</text>
  <text x="210" y="292" font-size="9" fill="#E5E0D2" font-style="italic">owned by holder</text>

  
  <rect x="200" y="375" width="500" height="35" rx="4" fill="#FAF8F1" stroke="#C8D6DC" stroke-width="1"></rect>
  <text x="450" y="397" text-anchor="middle" font-size="10" fill="#8A847A">Metadata: registration type  ·  account age  ·  ID level  ·  last SIM swap  ·  last number reassignment</text>
  <line x1="450" y1="356" x2="450" y2="375" stroke="#C8D6DC" stroke-width="1" stroke-dasharray="3 2"></line>
</svg>