<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
  </defs>

  <rect width="900" height="560" fill="#F7F4ED"></rect>
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Credential types and multi-SIM scenarios</text>

  
  <text x="50" y="70" font-size="13" font-weight="bold" fill="#10100B">Example 1: business with multiple employees</text>

  
  <rect x="50" y="85" width="180" height="55" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="140" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#FDFCF8">Company DID</text>
  <text x="140" y="125" text-anchor="middle" font-size="9" fill="#E5E0D2">Acme B.V.</text>

  
  <rect x="280" y="82" width="190" height="30" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="102" text-anchor="middle" font-size="10" fill="#FDFCF8">Contract owner: +31 6 1111</text>
  <rect x="280" y="116" width="190" height="30" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="136" text-anchor="middle" font-size="10" fill="#FDFCF8">Contract owner: +31 6 2222</text>
  <rect x="280" y="150" width="190" height="30" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="170" text-anchor="middle" font-size="10" fill="#FDFCF8">Contract owner: +31 6 3333</text>

  <line x1="230" y1="112" x2="280" y2="97" stroke="#0A55C7" stroke-width="1"></line>
  <line x1="230" y1="112" x2="280" y2="131" stroke="#0A55C7" stroke-width="1"></line>
  <line x1="230" y1="112" x2="280" y2="165" stroke="#0A55C7" stroke-width="1"></line>

  
  <rect x="540" y="82" width="155" height="30" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="617" y="102" text-anchor="middle" font-size="10" fill="#10100B">Employee DID 1</text>
  <rect x="540" y="116" width="155" height="30" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="617" y="136" text-anchor="middle" font-size="10" fill="#10100B">Employee DID 2</text>
  <rect x="540" y="150" width="155" height="30" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="617" y="170" text-anchor="middle" font-size="10" fill="#10100B">Employee DID 3</text>

  
  <text x="505" y="102" text-anchor="middle" font-size="8" fill="#8A847A">end user</text>
  <line x1="470" y1="97" x2="540" y2="97" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>
  <text x="505" y="136" text-anchor="middle" font-size="8" fill="#8A847A">end user</text>
  <line x1="470" y1="131" x2="540" y2="131" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>
  <text x="505" y="170" text-anchor="middle" font-size="8" fill="#8A847A">end user</text>
  <line x1="470" y1="165" x2="540" y2="165" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>

  
  <rect x="730" y="100" width="140" height="56" rx="3" fill="#E3ECFA" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="800" y="118" text-anchor="middle" font-size="9" fill="#063B92">Contract owner</text>
  <text x="800" y="130" text-anchor="middle" font-size="9" fill="#063B92">!= end user</text>
  <text x="800" y="146" text-anchor="middle" font-size="9" fill="#063B92">1 DID can own</text>
  <text x="800" y="158" text-anchor="middle" font-size="9" fill="#063B92">multiple contracts</text>

  
  <text x="50" y="220" font-size="13" font-weight="bold" fill="#10100B">Example 2: family plan</text>

  
  <rect x="50" y="235" width="180" height="55" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="140" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#FDFCF8">Parent DID</text>
  <text x="140" y="275" text-anchor="middle" font-size="9" fill="#E5E0D2">Contract holder</text>

  <rect x="280" y="235" width="190" height="30" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="255" text-anchor="middle" font-size="10" fill="#FDFCF8">Contract owner: +31 6 4444</text>
  <rect x="280" y="269" width="190" height="30" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="289" text-anchor="middle" font-size="10" fill="#FDFCF8">Contract owner: +31 6 5555</text>

  <line x1="230" y1="262" x2="280" y2="250" stroke="#0A55C7" stroke-width="1"></line>
  <line x1="230" y1="262" x2="280" y2="284" stroke="#0A55C7" stroke-width="1"></line>

  
  <rect x="540" y="235" width="155" height="30" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="617" y="255" text-anchor="middle" font-size="10" fill="#10100B">Parent DID</text>
  <text x="505" y="255" text-anchor="middle" font-size="8" fill="#8A847A">end user</text>
  <line x1="470" y1="250" x2="540" y2="250" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>

  
  <rect x="540" y="269" width="155" height="30" rx="3" fill="#EFEBE0" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="617" y="289" text-anchor="middle" font-size="10" fill="#10100B">Child DID</text>
  <text x="505" y="289" text-anchor="middle" font-size="8" fill="#8A847A">end user</text>
  <line x1="470" y1="284" x2="540" y2="284" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>

  <rect x="730" y="250" width="140" height="42" rx="3" fill="#E3ECFA" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="800" y="268" text-anchor="middle" font-size="9" fill="#063B92">Parent owns both,</text>
  <text x="800" y="282" text-anchor="middle" font-size="9" fill="#063B92">child uses one</text>

  
  <text x="50" y="340" font-size="13" font-weight="bold" fill="#10100B">Example 3: individual with dual SIM</text>

  
  <rect x="50" y="355" width="180" height="55" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="140" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#FDFCF8">Personal DID</text>
  <text x="140" y="395" text-anchor="middle" font-size="9" fill="#E5E0D2">One person, two numbers</text>

  <rect x="280" y="352" width="190" height="28" rx="3" fill="#0A55C7"></rect>
  <text x="375" y="370" text-anchor="middle" font-size="10" fill="#FDFCF8">End user: +31 6 7777 (privé)</text>
  <rect x="280" y="384" width="230" height="28" rx="3" fill="#0A55C7"></rect>
  <text x="395" y="402" text-anchor="middle" font-size="10" fill="#FDFCF8">End user: +31 6 8888 (zakelijk)</text>

  <line x1="230" y1="382" x2="280" y2="366" stroke="#0A55C7" stroke-width="1"></line>
  <line x1="230" y1="382" x2="280" y2="398" stroke="#0A55C7" stroke-width="1"></line>

  
  <rect x="540" y="352" width="110" height="28" rx="3" fill="#FAF8F1" stroke="#8A847A" stroke-width="1"></rect>
  <text x="595" y="370" text-anchor="middle" font-size="10" fill="#8A847A">Odido</text>
  <line x1="470" y1="366" x2="540" y2="366" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>

  <rect x="580" y="384" width="110" height="28" rx="3" fill="#FAF8F1" stroke="#8A847A" stroke-width="1"></rect>
  <text x="635" y="402" text-anchor="middle" font-size="10" fill="#8A847A">KPN</text>
  <line x1="510" y1="398" x2="580" y2="398" stroke="#8A847A" stroke-width="1" stroke-dasharray="3 2"></line>

  <rect x="730" y="365" width="140" height="42" rx="3" fill="#E3ECFA" stroke="#0A55C7" stroke-width="1"></rect>
  <text x="800" y="383" text-anchor="middle" font-size="9" fill="#063B92">1 DID, multiple numbers,</text>
  <text x="800" y="397" text-anchor="middle" font-size="9" fill="#063B92">different attestation providers</text>

  
  <text x="50" y="455" font-size="13" font-weight="bold" fill="#10100B">Key rules</text>
  <rect x="50" y="468" width="800" height="80" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5"></rect>

  <circle cx="80" cy="493" r="10" fill="#0A55C7"></circle>
  <text x="80" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">1</text>
  <text x="100" y="493" font-size="10" fill="#10100B">One instance can only be linked to </text>
  <text x="100" y="506" font-size="10" font-weight="bold" fill="#10100B">one DID at a time</text>

  <circle cx="350" cy="493" r="10" fill="#0A55C7"></circle>
  <text x="350" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">2</text>
  <text x="370" y="493" font-size="10" fill="#10100B">One DID can hold </text>
  <text x="370" y="506" font-size="10" font-weight="bold" fill="#10100B">multiple instances</text>

  <circle cx="600" cy="493" r="10" fill="#0A55C7"></circle>
  <text x="600" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">3</text>
  <text x="620" y="493" font-size="10" fill="#10100B">Contract owner and end user</text>
  <text x="620" y="506" font-size="10" font-weight="bold" fill="#10100B">can be different DIDs</text>

  <text x="100" y="535" font-size="10" fill="#8A847A">Each credential is independently verified by its attestation provider and can be independently revoked without affecting the others</text>
</svg>