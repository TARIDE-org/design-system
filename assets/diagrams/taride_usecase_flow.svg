<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
    <marker id="arrowR" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#10100B"></path>
    </marker>
    <marker id="arrowD" viewBox="0 0 7 10" refX="3.5" refY="10" markerWidth="7" markerHeight="10" orient="auto">
      <path d="M 0 0 L 3.5 10 L 7 0 z" fill="#10100B"></path>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#F7F4ED"></rect>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Use case: a new Calmido user</text>

  
  <rect x="30" y="65" width="250" height="90" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="155" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">1. DID creation</text>
  <line x1="55" y1="100" x2="230" y2="100" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="155" y="118" text-anchor="middle" font-size="10" fill="#E5E0D2">App generates key pair</text>
  <text x="155" y="134" text-anchor="middle" font-size="10" fill="#E5E0D2">Public key → on-chain (DID)</text>
  <text x="155" y="148" text-anchor="middle" font-size="10" fill="#E5E0D2">Private key → device only</text>

  
  <line x1="280" y1="110" x2="320" y2="110" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrowR)"></line>

  
  <rect x="320" y="65" width="250" height="90" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="445" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">2. Link phone number</text>
  <line x1="345" y1="100" x2="545" y2="100" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="445" y="118" text-anchor="middle" font-size="10" fill="#E5E0D2">Instance ↔ DID stored in resolver network</text>
  <text x="445" y="134" text-anchor="middle" font-size="10" fill="#E5E0D2">Cryptographic commitment</text>
  <text x="445" y="148" text-anchor="middle" font-size="10" fill="#E5E0D2">on-chain (number stays private)</text>

  
  <line x1="570" y1="110" x2="610" y2="110" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrowR)"></line>

  
  <rect x="610" y="65" width="260" height="90" rx="4" fill="#2E5A6E" filter="url(#shadow)"></rect>
  <text x="740" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">3. Provider verification</text>
  <line x1="635" y1="100" x2="845" y2="100" stroke="#3A6A7E" stroke-width="1"></line>
  <text x="740" y="118" text-anchor="middle" font-size="10" fill="#E5E0D2">Telecom confirms: number is</text>
  <text x="740" y="134" text-anchor="middle" font-size="10" fill="#E5E0D2">registered and active</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#E5E0D2">Credential issued → on-chain</text>

  
  <path d="M 740 155 L 740 190 L 155 190 L 155 215" fill="none" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrowD)"></path>

  
  <rect x="30" y="215" width="250" height="110" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="155" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">4. Receiving a call</text>
  <line x1="55" y1="250" x2="255" y2="250" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="155" y="268" text-anchor="middle" font-size="10" fill="#E5E0D2">App queries cache node in real time</text>
  <text x="155" y="284" text-anchor="middle" font-size="10" fill="#E5E0D2">Returns: DID + credential status</text>
  <text x="155" y="300" text-anchor="middle" font-size="10" fill="#E5E0D2">+ identity (if disclosed)</text>
  <text x="155" y="316" text-anchor="middle" font-size="10" fill="#E5E0D2">+ reputation score</text>

  
  <line x1="280" y1="270" x2="320" y2="270" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrowR)"></line>

  
  <rect x="320" y="215" width="250" height="110" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="445" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">5. User feedback</text>
  <line x1="345" y1="250" x2="545" y2="250" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="445" y="268" text-anchor="middle" font-size="10" fill="#E5E0D2">User taps: trusted / spam / fraud</text>
  <text x="445" y="284" text-anchor="middle" font-size="10" fill="#E5E0D2">Stored in Calmido database</text>
  <text x="445" y="300" text-anchor="middle" font-size="10" fill="#E5E0D2">Periodically aggregated</text>
  <text x="445" y="316" text-anchor="middle" font-size="10" fill="#E5E0D2">and written to on-chain contract</text>

  
  <line x1="570" y1="270" x2="610" y2="270" stroke="#10100B" stroke-width="1.5" marker-end="url(#arrowR)"></line>

  
  <rect x="610" y="215" width="260" height="110" rx="4" fill="#2E5A6E" filter="url(#shadow)"></rect>
  <text x="740" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#FDFCF8">6. Cross-app access</text>
  <line x1="635" y1="250" x2="845" y2="250" stroke="#3A6A7E" stroke-width="1"></line>
  <text x="740" y="268" text-anchor="middle" font-size="10" fill="#E5E0D2">Any app queries same cache nodes</text>
  <text x="740" y="284" text-anchor="middle" font-size="10" fill="#E5E0D2">Gets same DID + credentials</text>
  <text x="740" y="300" text-anchor="middle" font-size="10" fill="#E5E0D2">+ aggregated score from all apps</text>
  <text x="740" y="316" text-anchor="middle" font-size="10" fill="#E5E0D2">Raw UGC stays with originator</text>

  
  <rect x="30" y="370" width="840" height="140" rx="4" fill="#FAF8F1" stroke="#C8D6DC" stroke-width="1"></rect>
  <text x="450" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#10100B">Where data lives</text>
  <line x1="60" y1="405" x2="840" y2="405" stroke="#E0E8EC" stroke-width="1"></line>

  
  <rect x="60" y="420" width="16" height="12" rx="2" fill="#10100B"></rect>
  <text x="84" y="431" font-size="11" font-weight="bold" fill="#10100B">On-chain</text>
  <text x="60" y="450" font-size="10" fill="#8A847A">DID public keys  ·  credential records  ·  cryptographic commitments  ·  reputation integrity hashes</text>

  
  <rect x="60" y="468" width="16" height="12" rx="2" fill="#0A55C7"></rect>
  <text x="84" y="479" font-size="11" font-weight="bold" fill="#10100B">Resolver network (off-chain)</text>
  <text x="60" y="498" font-size="10" fill="#8A847A">Instance ↔ DID associations  ·  cached credentials and reputation  ·  real-time lookup API</text>

  
  <rect x="500" y="420" width="16" height="12" rx="2" fill="#2E5A6E"></rect>
  <text x="524" y="431" font-size="11" font-weight="bold" fill="#10100B">Application (Calmido)</text>
  <text x="500" y="450" font-size="10" fill="#8A847A">Individual user feedback  ·  private key storage  ·  UX layer</text>

  
  <rect x="500" y="468" width="16" height="12" rx="2" fill="#8A847A"></rect>
  <text x="524" y="479" font-size="11" font-weight="bold" fill="#10100B">User device</text>
  <text x="500" y="498" font-size="10" fill="#8A847A">Private key in secure enclave  ·  never leaves the device</text>
</svg>