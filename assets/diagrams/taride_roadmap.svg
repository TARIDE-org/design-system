<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="&#39;IBM Plex Sans&#39;, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10100B" flood-opacity="0.1"></feDropShadow>
    </filter>
  </defs>

  <rect width="900" height="340" fill="#F7F4ED"></rect>

  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#10100B" letter-spacing="0.5">Development roadmap</text>

  
  <line x1="50" y1="160" x2="850" y2="160" stroke="#C8D6DC" stroke-width="2"></line>

  
  <line x1="115" y1="155" x2="115" y2="165" stroke="#8A847A" stroke-width="2"></line>
  <text x="115" y="180" text-anchor="middle" font-size="10" fill="#8A847A">Q2 2026</text>

  <line x1="275" y1="155" x2="275" y2="165" stroke="#8A847A" stroke-width="2"></line>
  <text x="275" y="180" text-anchor="middle" font-size="10" fill="#8A847A">Q4 2026</text>

  <line x1="435" y1="155" x2="435" y2="165" stroke="#8A847A" stroke-width="2"></line>
  <text x="435" y="180" text-anchor="middle" font-size="10" fill="#8A847A">Q3 2027</text>

  <line x1="595" y1="155" x2="595" y2="165" stroke="#8A847A" stroke-width="2"></line>
  <text x="595" y="180" text-anchor="middle" font-size="10" fill="#8A847A">Q4 2028</text>

  <line x1="770" y1="155" x2="770" y2="165" stroke="#8A847A" stroke-width="2"></line>
  <text x="770" y="180" text-anchor="middle" font-size="10" fill="#8A847A">2031</text>

  
  <rect x="75" y="65" width="240" height="78" rx="4" fill="#10100B" filter="url(#shadow)"></rect>
  <text x="195" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFCF8">1. Proof of concept</text>
  <line x1="100" y1="97" x2="290" y2="97" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="195" y="114" text-anchor="middle" font-size="10" fill="#E5E0D2">Core protocol on testnet</text>
  <text x="195" y="128" text-anchor="middle" font-size="10" fill="#E5E0D2">DID + credentials + resolver network</text>
  <text x="195" y="142" text-anchor="middle" font-size="10" fill="#E5E0D2">Calmido integration</text>
  
  <line x1="195" y1="143" x2="195" y2="155" stroke="#10100B" stroke-width="2"></line>
  <circle cx="195" cy="160" r="5" fill="#10100B"></circle>

  
  <rect x="275" y="195" width="200" height="78" rx="4" fill="#0A55C7" filter="url(#shadow)"></rect>
  <text x="375" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFCF8">2. Pilot</text>
  <line x1="300" y1="227" x2="450" y2="227" stroke="#2E5A6E" stroke-width="1"></line>
  <text x="375" y="244" text-anchor="middle" font-size="10" fill="#E5E0D2">First telecom partner</text>
  <text x="375" y="258" text-anchor="middle" font-size="10" fill="#E5E0D2">KvK integration + ZK-proofs</text>
  <text x="375" y="272" text-anchor="middle" font-size="10" fill="#E5E0D2">Privacy layer live</text>
  
  <line x1="375" y1="195" x2="375" y2="165" stroke="#0A55C7" stroke-width="2"></line>
  <circle cx="375" cy="160" r="5" fill="#0A55C7"></circle>

  
  <rect x="475" y="65" width="200" height="78" rx="4" fill="#2E5A6E" filter="url(#shadow)"></rect>
  <text x="575" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#FDFCF8">3. Production</text>
  <line x1="500" y1="97" x2="650" y2="97" stroke="#3A6A7E" stroke-width="1"></line>
  <text x="575" y="114" text-anchor="middle" font-size="10" fill="#E5E0D2">L2 or EBSI deployment</text>
  <text x="575" y="128" text-anchor="middle" font-size="10" fill="#E5E0D2">Multi-channel + open API</text>
  <text x="575" y="142" text-anchor="middle" font-size="10" fill="#E5E0D2">Third-party integrations</text>
  
  <line x1="575" y1="143" x2="575" y2="155" stroke="#2E5A6E" stroke-width="2"></line>
  <circle cx="575" cy="160" r="5" fill="#2E5A6E"></circle>

  
  <rect x="640" y="195" width="210" height="78" rx="4" fill="#FDFCF8" stroke="#10100B" stroke-width="1.5" filter="url(#shadow)"></rect>
  <text x="745" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="#10100B">4. Scale</text>
  <line x1="665" y1="227" x2="825" y2="227" stroke="#C8D6DC" stroke-width="1"></line>
  <text x="745" y="244" text-anchor="middle" font-size="10" fill="#8A847A">Pan-European coverage</text>
  <text x="745" y="258" text-anchor="middle" font-size="10" fill="#8A847A">EU wallet integration</text>
  <text x="745" y="272" text-anchor="middle" font-size="10" fill="#8A847A">Self-sustaining ecosystem</text>
  
  <line x1="745" y1="195" x2="745" y2="165" stroke="#10100B" stroke-width="2"></line>
  <circle cx="745" cy="160" r="5" fill="#10100B" fill-opacity="0.5" stroke="#10100B" stroke-width="1.5"></circle>

  
  <text x="195" y="310" text-anchor="middle" font-size="9" fill="#BFB8AC">Working end-to-end</text>
  <text x="195" y="322" text-anchor="middle" font-size="9" fill="#BFB8AC">demo</text>
  <line x1="195" y1="185" x2="195" y2="298" stroke="#E0E8EC" stroke-width="1" stroke-dasharray="3 2"></line>

  <text x="375" y="310" text-anchor="middle" font-size="9" fill="#BFB8AC">First organisation live</text>
  <text x="375" y="322" text-anchor="middle" font-size="9" fill="#BFB8AC">on protocol</text>
  <line x1="375" y1="273" x2="375" y2="298" stroke="#E0E8EC" stroke-width="1" stroke-dasharray="3 2"></line>

  <text x="575" y="310" text-anchor="middle" font-size="9" fill="#BFB8AC">Production-grade</text>
  <text x="575" y="322" text-anchor="middle" font-size="9" fill="#BFB8AC">infrastructure</text>
  <line x1="575" y1="185" x2="575" y2="298" stroke="#E0E8EC" stroke-width="1" stroke-dasharray="3 2"></line>

  <text x="745" y="310" text-anchor="middle" font-size="9" fill="#BFB8AC">10,000+ verified DIDs</text>
  <text x="745" y="322" text-anchor="middle" font-size="9" fill="#BFB8AC">50+ connected apps</text>
  <line x1="745" y1="273" x2="745" y2="298" stroke="#E0E8EC" stroke-width="1" stroke-dasharray="3 2"></line>
</svg>